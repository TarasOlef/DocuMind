version: '3.8'

services:
  api:
    build: .
    container_name: documind_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_started

  db:
    image: pgvector/pgvector:pg16
    container_name: documind_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-documind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-documind_password}
      POSTGRES_DB: ${POSTGRES_DB:-documind}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
